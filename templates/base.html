<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SentinelShield IDS{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}?v=2">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: JetBrains Mono + Inter -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body>

<!-- ============================================================
     TOP NAVBAR
     ============================================================ -->
<nav class="navbar navbar-expand-lg navbar-dark sentinel-navbar">
    <div class="container-fluid px-4">

        <!-- Brand / Logo -->
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <div class="brand-icon">
                <i class="bi bi-shield-fill-check"></i>
            </div>
            <div>
                <span class="brand-name">SentinelShield</span>
                <span class="brand-tagline d-none d-md-inline">IDS · WAF · Monitor</span>
            </div>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link {% if page == 'dashboard' %}active{% endif %}" href="/">
                        <i class="bi bi-speedometer2 me-1"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page == 'test' %}active{% endif %}" href="/test">
                        <i class="bi bi-bug me-1"></i> Test Requests
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page == 'logs' %}active{% endif %}" href="/logs">
                        <i class="bi bi-journal-text me-1"></i> Logs
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page == 'report' %}active{% endif %}" href="/report">
                        <i class="bi bi-file-earmark-bar-graph me-1"></i> Report
                    </a>
                </li>
            </ul>

            <!-- Live status indicator -->
            <div class="ms-3 d-flex align-items-center gap-2">
                <span class="status-dot"></span>
                <small class="text-muted-light">System Active</small>
            </div>
        </div>
    </div>
</nav>

<!-- ============================================================
     MAIN CONTENT
     ============================================================ -->
<main class="main-content">
    {% block content %}{% endblock %}
</main>

<!-- ============================================================
     FOOTER
     ============================================================ -->
<footer class="sentinel-footer">
    <div class="container-fluid px-4">
        <div class="row align-items-center">
            <div class="col-md-6">
                <span class="text-muted-light">
                    <i class="bi bi-shield-fill-check text-accent me-1"></i>
                    SentinelShield
                </span>
            </div>
        </div>
    </div>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js for dashboard charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
